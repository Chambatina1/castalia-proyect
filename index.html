<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Castalia Proyect</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0D1117; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { text-align: center; padding: 60px 40px; }
  .logo { font-size: 48px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px; }
  .logo span { color: #38C5B5; }
  .sub { color: #5D7380; font-size: 16px; margin-bottom: 40px; }
  .btn { display: inline-block; background: #38C5B5; color: #fff; text-decoration: none; padding: 14px 36px; border-radius: 12px; font-weight: 600; font-size: 15px; transition: all 0.2s; }
  .btn:hover { background: #2DA194; transform: translateY(-1px); }
  .gh { margin-top: 24px; }
  .gh a { color: #5D7380; text-decoration: none; font-size: 13px; }
  .gh a:hover { color: #38C5B5; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">CASTALIA <span>PROYECT</span></div>
    <p class="sub">Plataforma de documentaci&oacute;n visual de proyectos</p>
    <a href="https://castalia-pro.onrender.com" class="btn">Abrir Aplicaci&oacute;n &rarr;</a>
    <div class="gh">
      <a href="https://github.com/Chambatina1/castalia-proyect">&larr; Ver c&oacute;digo en GitHub</a>
    </div>
  </div>
</body>
</html>
